name: Claude Skill Review On Mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review.
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: claude-skill-review-${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    name: Run Claude skill review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.comment.body, '@claude review') &&
        (
          github.event_name == 'pull_request_review_comment' ||
          github.event.issue.pull_request
        )
      )
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture pull request context and diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
        run: |
          mkdir -p .claude
          gh pr view "$PR_NUMBER" \
            --json number,url,title,baseRefName,headRefName,headRepositoryOwner,headRepository,baseRefOid,headRefOid \
            > .claude/pr-context.json
          gh pr diff "$PR_NUMBER" --patch > .claude/pr.diff

      - name: Run Claude review workflow
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            /review-router

            Review this pull request using the AI Coding Kernel skill set.

            Target PR:
            - Repository: ${{ github.repository }}
            - PR number: ${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
            - PR context file: .claude/pr-context.json
            - PR diff file: .claude/pr.diff

            Requirements:
            - Read .claude/pr-context.json and .claude/pr.diff before deciding layer applicability.
            - Use review-router first.
            - Run only required gates.
            - Include review-code-health only when code-health risk or non-blocking debt is applicable.
            - End with review-final-merge-gate style output.
            - Keep current-PR blockers in Required fixes.
            - Put non-blocking follow-up under Improvement ledger candidates.
            - Do not deploy, merge, release, publish, or mutate production configuration.
            - Do not store secrets or raw prompts.

            Final output contract:
            - Decision: approve | approve with comments | request changes | block | insufficient evidence
            - Layer summary
            - Required fixes
            - Suggestions
            - Improvement ledger candidates when applicable
            - Evidence reviewed
            - Residual risk
          claude_args: |
            --max-turns 10
