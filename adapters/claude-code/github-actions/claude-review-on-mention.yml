name: Claude Skill Review On Mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review.
        required: true
      allow_fork:
        description: Allow reviewing a fork PR. Requires manual owner approval.
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: claude-skill-review-${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    name: Run Claude skill review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.comment.body, '@claude review') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          github.event_name == 'pull_request_review_comment' ||
          github.event.issue.pull_request
        )
      )
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve pull request safety boundary
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
          EVENT_NAME: ${{ github.event_name }}
          ALLOW_FORK: ${{ inputs.allow_fork || 'false' }}
        run: |
          pr_context="$RUNNER_TEMP/pr-context.json"
          gh pr view "$PR_NUMBER" \
            --json number,url,title,baseRefName,headRefName,headRepositoryOwner,headRepository,baseRefOid,headRefOid \
            > "$pr_context"

          head_owner="$(PR_CONTEXT="$pr_context" node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync(process.env.PR_CONTEXT,'utf8')); console.log(p.headRepositoryOwner?.login ?? p.headRepositoryOwner?.name ?? p.headRepositoryOwner ?? '')")"
          head_repo="$(PR_CONTEXT="$pr_context" node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync(process.env.PR_CONTEXT,'utf8')); console.log(p.headRepository?.name ?? p.headRepository ?? '')")"
          base_repo="${GITHUB_REPOSITORY#*/}"

          if [ "$head_owner/$head_repo" != "$GITHUB_REPOSITORY_OWNER/$base_repo" ] && { [ "$EVENT_NAME" != "workflow_dispatch" ] || [ "$ALLOW_FORK" != "true" ]; }; then
            echo "Fork PR review is blocked by default. Use workflow_dispatch with allow_fork=true only after owner approval."
            exit 1
          fi

      - name: Check out pull request head
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
        run: |
          gh pr checkout "$PR_NUMBER" --detach

      - name: Capture pull request head context and diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
        run: |
          mkdir -p .claude
          gh pr view "$PR_NUMBER" \
            --json number,url,title,baseRefName,headRefName,headRepositoryOwner,headRepository,baseRefOid,headRefOid \
            > .claude/pr-context.json
          gh pr diff "$PR_NUMBER" --patch > .claude/pr.diff
          git rev-parse HEAD > .claude/pr-head-sha.txt

          expected_head="$(node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync('.claude/pr-context.json','utf8')); console.log(p.headRefOid ?? '')")"
          actual_head="$(cat .claude/pr-head-sha.txt)"
          if [ "$expected_head" != "$actual_head" ]; then
            echo "Checked-out workspace is not the PR head."
            exit 1
          fi

      - name: Run Claude review workflow
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            /review-router

            Review this pull request using the Agent Spectrum Kernel skill set.

            Target PR:
            - Repository: ${{ github.repository }}
            - PR number: ${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
            - PR context file: .claude/pr-context.json
            - PR diff file: .claude/pr.diff
            - PR head SHA file: .claude/pr-head-sha.txt

            Requirements:
            - Treat the checked-out workspace as the PR head workspace.
            - Read .claude/pr-context.json, .claude/pr.diff, and .claude/pr-head-sha.txt before deciding layer applicability.
            - If the PR head workspace or diff evidence is unavailable, return insufficient evidence instead of a confident decision.
            - Use review-router first.
            - Run only required gates.
            - Include review-code-health only when code-health risk or non-blocking debt is applicable.
            - End with review-final-merge-gate style output.
            - Keep current-PR blockers in Required fixes.
            - Put non-blocking follow-up under Improvement ledger candidates.
            - Do not deploy, merge, release, publish, or mutate production configuration.
            - Do not store secrets or raw prompts.

            Final output contract:
            - Decision: approve | approve with comments | request changes | block | insufficient evidence
            - Layer summary
            - Required fixes
            - Suggestions
            - Improvement ledger candidates when applicable
            - Evidence reviewed
            - Residual risk
          claude_args: |
            --max-turns 10
